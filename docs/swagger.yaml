      messageTimestamp:
        type: integer
      messageType:
        type: string
      pushName:
        type: string
      source:
        type: string
      status:
        type: string
    type: object
  dto.SendTextResponseContextInfo:
    properties:
      participant:
        type: string
      quotedMessage:
        $ref: '#/definitions/dto.ContextInfoQuotedMessage'
      stanzaId:
        type: string
    type: object
  dto.SendTextResponseMessage:
    properties:
      conversation:
        type: string
    type: object
  dto.StatusInstanceResponse:
    properties:
      id:
        type: string
      instance:
        $ref: '#/definitions/dto.StatusInstanceResponseEvolutionCompatibility'
      state:
        type: string
    type: object
  dto.StatusInstanceResponseEvolutionCompatibility:
    properties:
      instanceName:
        type: string
      state:
        type: string
    type: object
  dto.UpdateInstanceRequest:
    properties:
      proxyHost:
        type: string
      proxyPassword:
        type: string
      proxyPort:
        type: string
      proxyProtocol:
        type: string
      proxyUsername:
        type: string
      webhook:
        properties:
          base64:
            type: boolean
          events:
            items:
              type: string
            type: array
          url:
            type: string
        type: object
    type: object
  dto.UpdateInstanceResponse:
    properties:
      alwaysOnline:
        type: boolean
      groupsIgnore:
        type: boolean
      id:
        type: string
      msgCall:
        type: string
      proxyHost:
        type: string
      proxyPassword:
        type: string
      proxyPort:
        type: string
      proxyProtocol:
        type: string
      proxyUsername:
        type: string
      readMessages:
        type: boolean
      readStatus:
        type: boolean
      rejectCall:
        type: boolean
      remoteJID:
        type: string
      syncFullHistory:
        type: boolean
      syncRecentHistory:
        type: boolean
      webhook:
        $ref: '#/definitions/models.InstanceWebhook'
    type: object
  models.InstanceWebhook:
    properties:
      base64:
        type: boolean
      byEvents:
        type: boolean
      enabled:
        type: boolean
      events:
        items:
          type: string
        type: array
      headers:
        additionalProperties:
          type: string
        type: object
      url:
        type: string
    type: object
  utils.HTTPErrorResponse:
    properties:
      error:
        type: string
      errorMessage:
        type: string
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: Verbeux AI
    url: https://github.com/verbeux-ai/whatsmiau
  description: WhatsMiau - WhatsApp API compatible with Evolution API. Provides instance
    management, messaging, and chat operations over WhatsApp Web.
  license:
    name: MIT
  title: WhatsMiau API
  version: 0.3.2
paths:
  /:
    get:
      description: Returns API status, version, and WhatsApp Web client version
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RootResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
      summary: API health check and info
      tags:
      - Root
  /chat/deleteMessageForEveryone/{instance}:
    delete:
      consumes:
      - application/json
      description: Revokes a message in the chat so it is deleted for all participants
        (BuildRevoke + SendMessage)
      parameters:
      - description: Instance ID
        in: path
        name: instance
        required: true
        type: string
      - description: Message to revoke
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.DeleteMessageForEveryoneRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Empty object on success
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete message for everyone
      tags:
      - Chat
  /chat/markMessageAsRead/{instance}:
    post:
      consumes:
      - application/json
      description: Marks one or more messages as read in a WhatsApp conversation
      parameters:
      - description: Instance ID
        in: path
        name: instance
        required: true
        type: string
      - description: Messages to mark as read
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.ReadMessagesRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Empty object on success
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Mark messages as read
      tags:
      - Chat
  /chat/sendPresence/{instance}:
    post:
      consumes:
      - application/json
      description: Sends a presence status (composing/available) to a WhatsApp contact,
        with optional auto-stop delay
      parameters:
      - description: Instance ID
        in: path
        name: instance
        required: true
        type: string
      - description: Presence parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.SendChatPresenceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Empty object on success
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Send chat presence (typing indicator)
      tags:
      - Chat
  /chat/whatsappNumbers/{instance}:
    post:
      consumes:
      - application/json
      description: Checks whether the given phone numbers are registered on WhatsApp
      parameters:
      - description: Instance ID
        in: path
        name: instance
        required: true
        type: string
      - description: Numbers to check
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.NumberExistsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List of number existence results
          schema:
            items:
              type: object
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Check if numbers exist on WhatsApp
      tags:
      - Chat
  /instance:
    get:
      description: Returns all instances, optionally filtered by name or ID
      parameters:
      - description: Filter by instance name
        in: query
        name: instanceName
        type: string
      - description: Filter by instance ID
        in: query
        name: id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.ListInstancesResponse'
            type: array
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List instances
      tags:
      - Instance
    post:
      consumes:
      - application/json
      description: Creates a new WhatsApp instance with the given name and optional
        configuration
      parameters:
      - description: Instance creation parameters
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.CreateInstanceRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.CreateInstanceResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a new WhatsApp instance
      tags:
      - Instance
  /instance/{id}:
    delete:
      description: Disconnects and permanently removes the specified instance
      parameters:
      - description: Instance ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DeleteInstanceResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete an instance
      tags:
      - Instance
  /instance/{id}/connect:
    post:
      description: Initiates connection for an instance. Returns a base64-encoded
        QR code PNG if not yet connected, or a connected status message.
      parameters:
      - description: Instance ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ConnectInstanceResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Connect an instance (get QR code)
      tags:
      - Instance
  /instance/{id}/logout:
    post:
      description: Disconnects the WhatsApp session for the given instance without
        deleting it
      parameters:
      - description: Instance ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.DeleteInstanceResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.HTTPErrorResponse'
