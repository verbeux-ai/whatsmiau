  dto.MessageResponseKey:
    properties:
      fromMe:
        type: boolean
      id:
        type: string
      remoteJid:
        type: string
    type: object
  dto.NumberExistsRequest:
    properties:
      numbers:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - numbers
    type: object
  dto.QuotedKey:
    properties:
      id:
