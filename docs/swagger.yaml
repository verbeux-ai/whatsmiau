        type: string
      displayText:
        type: string
      id:
        type: string
      key:
        type: string
      keyType:
        type: string
      name:
        type: string
      type:
        enum:
        - reply
        - pix
        type: string
    required:
    - displayText
    - type
    type: object
  dto.SendButtonsResponse:
    properties:
      instanceId:
        type: string
      key:
        $ref: '#/definitions/dto.MessageResponseKey'
      messageTimestamp:
        type: integer
      messageType:
        type: string
      status:
        type: string
    type: object
  dto.SendChatPresenceRequest:
    properties:
      delay:
        maximum: 300000
        minimum: 0
        type: integer
      number:
        type: string
      presence:
        $ref: '#/definitions/dto.SendPresenceRequestPresence'
      type:
        $ref: '#/definitions/dto.SendPresenceRequestType'
