      messageType:
        type: string
      status:
        type: string
    type: object
  dto.SendMediaRequest:
    properties:
      caption:
        type: string
      delay:
        maximum: 300000
        minimum: 0
        type: integer
      fileName:
        type: string
      media:
        description: Media is the URL of the file
        type: string
      mediatype:
        type: string
      mentioned:
        items:
          type: string
        type: array
      mentionsEveryOne:
        type: boolean
      mimetype:
        type: string
      number:
        type: string
      quoted:
        $ref: '#/definitions/dto.MessageRequestQuoted'
    type: object
  dto.SendPresenceRequestPresence:
    enum:
    - composing
    - available
    type: string
    x-enum-varnames:
    - PresenceComposing
    - PresenceAvailable
  dto.SendPresenceRequestType:
    enum:
    - text
    - audio
    type: string
    x-enum-varnames:
    - PresenceTypeText
    - PresenceTypeAudio
  dto.SendReactionRequest:
    properties:
      key:
