        type: string
      mentioned:
        items:
          type: string
        type: array
      mentionsEveryOne:
        type: boolean
      mimetype:
        type: string
      number:
        type: string
      quoted:
        $ref: '#/definitions/dto.MessageRequestQuoted'
    type: object
  dto.SendDocumentResponse:
    properties:
      contextInfo: {}
      instanceId:
        type: string
      key:
        $ref: '#/definitions/dto.MessageResponseKey'
      message:
        $ref: '#/definitions/dto.SendDocumentResponseData'
      messageTimestamp:
        type: integer
      messageType:
        type: string
      pushName:
        type: string
      source:
        type: string
      status:
        type: string
    type: object
  dto.SendDocumentResponseData:
    properties:
